version: 0.0
Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        # CodeDeploy substitutes <TASK_DEFINITION> with the revision it registers
        # from taskdef.json (in this repo under deploy/). The GitHub Actions
        # workflow renders that file — role ARNs from repo variables, DB/app
        # config from SSM — and CodeDeploy fills in the image (<IMAGE1_NAME>).
        TaskDefinition: <TASK_DEFINITION>
        LoadBalancerInfo:
          ContainerName: "photo-uploader-app"
          ContainerPort: 8080
        PlatformVersion: LATEST

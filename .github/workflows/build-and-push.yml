name: Build and push image to ECR

# On every push to main this:
#   1. Builds the image and pushes two tags: a moving `latest` (what the
#      pipeline deploys) and an immutable `<name>_<sha>` for traceability.
#   2. Renders deploy/taskdef.json into config-source.zip and uploads it to the
#      pipeline's artifact bucket. The task definition is assembled from three
#      sources:
#        - GitHub repo variables -> executionRoleArn / taskRoleArn
#        - SSM Parameter Store    -> DB endpoint/secret ARN, image bucket, CDN
#        - CodeDeploy             -> the image (<IMAGE1_NAME>, substituted at deploy)
#   3. Pushes `latest`, which EventBridge reacts to -> CodePipeline ->
#      CodeDeploy (blue/green).
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle"
      - "settings.gradle"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

# OIDC: request a short-lived token to assume the AWS role. No static keys.
permissions:
  id-token: write
  contents: read

env:
  PROJECT: photo-uploader

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ange_buhendwa_${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" .
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Render and upload deploy bundle
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          # Role ARNs come from GitHub repo variables (CloudFormation outputs
          # TaskExecutionRoleArn / TaskRoleArn — set them as these vars).
          ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
        run: |
          set -euo pipefail

          # DB + app config comes from SSM (published by CloudFormation).
          ssm() { aws ssm get-parameter --name "/${PROJECT}/app/$1" \
            --query 'Parameter.Value' --output text; }
          export DB_HOST="$(ssm db-host)"
          export DB_PORT="$(ssm db-port)"
          export DB_NAME="$(ssm db-name)"
          export DB_USERNAME="$(ssm db-username)"
          export DB_SECRET_ARN="$(ssm db-secret-arn)"
          export IMAGE_BUCKET="$(ssm image-bucket)"
          export CLOUDFRONT_DOMAIN="$(ssm cloudfront-domain)"

          # Substitute ONLY our placeholders; leave <IMAGE1_NAME> for CodeDeploy.
          envsubst '${ECS_EXECUTION_ROLE_ARN} ${ECS_TASK_ROLE_ARN} ${DB_HOST} ${DB_PORT} ${DB_NAME} ${DB_USERNAME} ${DB_SECRET_ARN} ${IMAGE_BUCKET} ${CLOUDFRONT_DOMAIN} ${AWS_REGION}' \
            < deploy/taskdef.json > taskdef.json

          # Fail loudly if anything stayed unsubstituted or the JSON is invalid.
          if grep -q '\${' taskdef.json; then
            echo "ERROR: unsubstituted placeholders remain in taskdef.json:"; cat taskdef.json; exit 1
          fi
          python3 -c "import json; json.load(open('taskdef.json'))"

          cp deploy/appspec.yaml appspec.yaml
          zip -j config-source.zip taskdef.json appspec.yaml

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          BUCKET="${PROJECT}-artifacts-${ACCOUNT_ID}-${AWS_REGION}"
          aws s3 cp config-source.zip "s3://${BUCKET}/config-source.zip"
          echo "Uploaded config-source.zip to s3://${BUCKET}."

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.build.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ange_buhendwa_${{ github.sha }}
        run: |
          # Push the immutable SHA tag first, then `latest` last: the `latest`
          # push is the single event EventBridge filters on to start the pipeline.
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Uploader</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 2rem 1.5rem 1rem;
        text-align: center;
      }
      header h1 { margin: 0; font-size: 1.9rem; }
      header p { margin: 0.35rem 0 0; color: #94a3b8; }
      main { max-width: 1000px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
      .uploader {
        background: #1e293b;
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        display: grid;
        gap: 0.85rem;
        margin-bottom: 2rem;
      }
      .uploader h2 { margin: 0; font-size: 1.1rem; }
      input, textarea, button {
        font: inherit;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        padding: 0.6rem 0.75rem;
      }
      textarea { resize: vertical; min-height: 3rem; }
      button {
        background: #38bdf8;
        color: #04263a;
        font-weight: 600;
        border: none;
        cursor: pointer;
        justify-self: start;
        padding: 0.6rem 1.4rem;
      }
      button:disabled { opacity: 0.6; cursor: progress; }
      .status { min-height: 1.2rem; font-size: 0.9rem; color: #94a3b8; }
      .status.error { color: #f87171; }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
      }
      .card {
        background: #1e293b;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .card img { width: 100%; height: 180px; object-fit: cover; display: block; background: #0b1220; }
      .card .desc { padding: 0.75rem 0.85rem; font-size: 0.95rem; }
      .empty { color: #64748b; text-align: center; padding: 2rem 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>Photo Uploader</h1>
      <p>Upload images with descriptions — stored in S3, served via CloudFront</p>
    </header>

    <main>
      <form class="uploader" id="upload-form">
        <h2>Add a photo</h2>
        <input type="file" id="file" name="file" accept="image/*" required />
        <textarea id="description" name="description" placeholder="Description" required></textarea>
        <button type="submit" id="submit">Upload</button>
        <div class="status" id="status"></div>
      </form>

      <section class="gallery" id="gallery"></section>
    </main>

    <script>
      const galleryEl = document.getElementById("gallery");
      const form = document.getElementById("upload-form");
      const statusEl = document.getElementById("status");
      const submitBtn = document.getElementById("submit");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      async function loadGallery() {
        try {
          const res = await fetch("/api/photos");
          if (!res.ok) throw new Error("Failed to load gallery");
          const photos = await res.json();
          if (photos.length === 0) {
            galleryEl.innerHTML = '<p class="empty">No photos yet — upload the first one.</p>';
            return;
          }
          galleryEl.innerHTML = photos
            .map(
              (p) => `
              <article class="card">
                <img src="${p.imageUrl}" alt="${p.description}" loading="lazy" />
                <div class="desc">${p.description}</div>
              </article>`
            )
            .join("");
        } catch (err) {
          galleryEl.innerHTML = '<p class="empty">Could not load the gallery.</p>';
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitBtn.disabled = true;
        setStatus("Uploading…");
        try {
          const res = await fetch("/api/photos", { method: "POST", body: new FormData(form) });
          if (!res.ok) throw new Error(await res.text());
          form.reset();
          setStatus("Uploaded.");
          await loadGallery();
        } catch (err) {
          setStatus("Upload failed: " + err.message, true);
        } finally {
          submitBtn.disabled = false;
        }
      });

      loadGallery();
    </script>
  </body>
</html>

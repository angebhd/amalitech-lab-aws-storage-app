# Test-only configuration: an in-memory H2 database stands in for Amazon RDS so
# the context test runs without any external dependency. The S3 bucket and
# CloudFront domain are placeholders — no AWS call is made during the test.
spring:
  datasource:
    url: jdbc:h2:mem:photos;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  s3:
    bucket: test-bucket
  cloudfront:
    domain: example.cloudfront.net
  aws:
    region: eu-north-1
